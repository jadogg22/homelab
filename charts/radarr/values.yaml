controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/onedr0p/radarr
          tag: 5.19.1
        env:
          - name: RADARR__PORT
            value: "7878"
        resources:
          requests:
            cpu: 10m
            memory: 256Mi
          limits:
            memory: 1Gi

service:
  main:
    controller: main
    ports:
      http:
        port: 7878

ingress:
  main:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - host: radarr.jadogg.com
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - secretName: jadogg-wildcard-cert
        hosts:
          - radarr.jadogg.com

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    storageClass: longhorn-replicated
    accessMode: ReadWriteOnce
    size: 2Gi

  media:
    enabled: true
    type: persistentVolumeClaim
    storageClass: truenas-nfs-media
    accessMode: ReadWriteMany
    size: 500Gi
    globalMounts:
      - path: /data
