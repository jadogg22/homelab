controllers:
  main:
    pod:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
    containers:
      main:
        image:
          repository: ghcr.io/fallenbagel/jellyseerr
          tag: latest
        env:
          - name: LOG_LEVEL
            value: "info"
          - name: TZ
            value: "UTC"
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            memory: 512Mi

service:
  main:
    controller: main
    ports:
      http:
        port: 5055

ingress:
  main:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - host: requests.jadogg.com
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - secretName: jadogg-wildcard-cert
        hosts:
          - requests.jadogg.com

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    storageClass: longhorn-replicated
    accessMode: ReadWriteOnce
    size: 2Gi
    advancedMounts:
      main:
        main:
          - path: /app/config
