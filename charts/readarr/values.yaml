controllers:
  main:
    pod:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: "OnRootMismatch"
    containers:
      main:
        image:
          repository: ghcr.io/linuxserver/readarr
          tag: develop
        env:
          - name: PUID
            value: "568"
          - name: PGID
            value: "568"
          - name: TZ
            value: "UTC"
        resources:
          requests:
            cpu: 10m
            memory: 256Mi
          limits:
            memory: 1Gi

service:
  main:
    controller: main
    ports:
      http:
        port: 8787

ingress:
  main:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - host: readarr.jadogg.com
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - secretName: jadogg-wildcard-cert
        hosts:
          - readarr.jadogg.com

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    storageClass: longhorn-replicated
    accessMode: ReadWriteOnce
    size: 2Gi

  media:
    enabled: true
    type: persistentVolumeClaim
    storageClass: truenas-nfs-media
    accessMode: ReadWriteMany
    size: 500Gi
    globalMounts:
      - path: /data
