# charts/nextcloud/values.yaml (Updated for Secrets)

# 1. Database Configuration (References the existing Secret)
mariadb:
  enabled: true
  auth:
    username: nextcloud
    database: nextcloud
    existingSecret: nextcloud-secrets
    passwordKey: mariadb-password
    rootPasswordKey: mariadb-root-password

nextcloud:
  host: "nextcloud.jadogg.com"
  username: "admin"
  existingSecret:
    enabled: true
    secretName: nextcloud-secrets
    passwordKey: nextcloud-admin-password
    
# 3. Persistence and Ingress (No changes)
persistence:
  enabled: true
  size: 20Gi
│ storageClass: longhorn-replicated
  
ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  hosts:
    - host: nextcloud.jadogg.com
  tls:
    - secretName: jadogg-wildcard-cert
      hosts:
        - nextcloud.jadogg.com
