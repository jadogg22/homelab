# charts/nextcloud/values.yaml

# 1. Database Configuration (Tells the MariaDB sub-chart which passwords to use)
mariadb:
  enabled: true
  auth:
    username: nextcloud
    database: nextcloud
    
    # Credentials sourced from your Sealed Secret
    existingSecret: nextcloud-secrets
    rootPasswordKey: mariadb-root-password
    passwordKey: mariadb-password # MariaDB user password

# 2. Nextcloud Application Settings
nextcloud:
  host: "nextcloud.jadogg.com"
  username: "admin"
  
  # Nextcloud Admin Password (for first login)
  existingSecret:
    enabled: true
    secretName: nextcloud-secrets
    passwordKey: nextcloud-admin-password
    
  # how to connect to the database using the secret password.
  database:
    type: mariadb
    host: nextcloud-mariadb # Service name provided by the Helm chart
    name: nextcloud
    user: nextcloud
    
    # This ensures the Nextcloud client uses the correct password from the Secret.
    existingSecret: nextcloud-secrets
    secretPasswordKey: mariadb-password 

# 3. Persistence (Storage Configuration)
persistence:
  enabled: true
  size: 20Gi
  storageClass: longhorn-replicated # <--- Correctly set to your Longhorn SC

# 4. Ingress Configuration (External Access)
ingress:
  enabled: true
  className: traefik
  annotations:
    # Forces connection over HTTPS
    traefik.ingress.kubernetes.io/router.entrypoints: websecure 
  hosts:
    - host: nextcloud.jadogg.com
  tls:
    - secretName: jadogg-wildcard-cert
      hosts:
        - nextcloud.jadogg.com
