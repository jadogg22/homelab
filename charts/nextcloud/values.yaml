# charts/nextcloud/values.yaml

# 1. Database Configuration (MariaDB subchart)
mariadb:
  enabled: true
  auth:
    username: nextcloud
    database: nextcloud
    existingSecret: nextcloud-secrets      # Secret that contains mariadb-password and mariadb-root-password
    passwordKey: mariadb-password          # Password for the 'nextcloud' DB user
    rootPasswordKey: mariadb-root-password # Root password

# 2. Nextcloud Application Settings
nextcloud:
  host: "nextcloud.jadogg.com"
  username: "admin"
  
  # Admin password from secret
  existingSecret:
    enabled: true
    secretName: nextcloud-secrets
    passwordKey: nextcloud-admin-password

  # Database config (points to the same MariaDB service)
  database:
    type: mariadb
    host: nextcloud-mariadb
    name: nextcloud
    user: nextcloud
    existingSecret: nextcloud-secrets
    secretPasswordKey: mariadb-password

  # Init container ensures DB is ready before Nextcloud starts
  initContainers:
    enabled: true
    initScripts:
      db:
        secretName: nextcloud-secrets
        secretKey: mariadb-password

# 3. Persistence
persistence:
  enabled: true
  size: 20Gi
  storageClass: longhorn-replicated

# 4. Ingress
ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  hosts:
    - host: nextcloud.jadogg.com
  tls:
    - secretName: jadogg-wildcard-cert
      hosts:
 # 1. DISABLE the embedded database (We use our own external one)
mariadb:
  enabled: false

# 2. Configure External Database Connection
externalDatabase:
  enabled: true
  type: mysql
  host: mariadb.default.svc.cluster.local
  database: nextcloud
  user: nextcloud
  existingSecret:
    enabled: true
    secretName: mariadb-secrets   # The sealed secret we fixed earlier
    usernameKey: nextcloud-user   # (Optional if you didn't set this key, defaults are fine)
    passwordKey: mariadb-password # MUST match the key in your mariadb-secrets

# 3. Nextcloud Admin User (Web Login)
nextcloud:
  host: "nextcloud.jadogg.com"
  username: "admin"
  password: "" # Leave empty, we use the secret below
  existingSecret:
    enabled: true
    secretName: nextcloud-secrets # The new secret for the web UI admin
    passwordKey: nextcloud-admin-password

# 4. Persistence
persistence:
  enabled: true
  size: 20Gi
  storageClass: longhorn
  accessMode: ReadWriteOnce

# 5. Ingress (Formatted for the Official Nextcloud Chart)
ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  # TLS Configuration
  tls:
    - secretName: jadogg-wildcard-cert
      hosts:
        - nextcloud.jadogg.com
  # Host Configuration
  hosts:
    - host: nextcloud.jadogg.com
      paths:
        - path: /
          pathType: Prefix       - nextcloud.jadogg.com
