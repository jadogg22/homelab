controllers:
  main:
    pod:
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: "OnRootMismatch"
        sysctls:
          - name: net.ipv4.conf.all.src_valid_mark
            value: "1"
    containers:
      main:
        image:
          repository: qmcgaw/gluetun
          tag: latest
        env:
          - name: VPN_SERVICE_PROVIDER
            value: "airvpn"
          - name: VPN_TYPE
            value: "wireguard"
          - name: VPN_PORT_FORWARDING
            value: "on"
          - name: VPN_PORT_FORWARDING_LISTENING_PORT
            value: "12332"
          - name: WIREGUARD_MTU
            value: "1320"
          - name: VPN_IPV6
            value: "off"
          - name: WIREGUARD_PRIVATE_KEY
            valueFrom:
              secretKeyRef:
                name: gluetun-vpn-creds
                key: WIREGUARD_PRIVATE_KEY
          - name: WIREGUARD_PRESHARED_KEY
            valueFrom:
              secretKeyRef:
                name: gluetun-vpn-creds
                key: WIREGUARD_PRESHARED_KEY
          - name: WIREGUARD_ADDRESSES
            valueFrom:
              secretKeyRef:
                name: gluetun-vpn-creds
                key: WIREGUARD_ADDRESSES
          - name: FIREWALL_OUTBOUND_SUBNETS
            value: "10.0.0.0/16,10.244.0.0/16,10.96.0.0/12"
          - name: ROUTE_ALLOWED_IPS
            value: "10.0.0.0/16,10.244.0.0/16,10.96.0.0/12"
        securityContext:
          runAsUser: 0
          capabilities:
            add:
              - NET_ADMIN
          privileged: true # Required for Wireguard

      qbittorrent:
        image:
          repository: ghcr.io/onedr0p/qbittorrent
          tag: 5.0.4
        env:
          - name: QBITTORRENT__PORT
            value: "8080"
          - name: QBITTORRENT__BT_PORT
            value: "12332"
        securityContext:

          runAsUser: 568
          runAsGroup: 568
        resources:
          requests:
            cpu: 10m
            memory: 256Mi
          limits:
            memory: 2Gi

service:
  main:
    controller: main
    ports:
      http:
        port: 8000
      qbittorrent:
        port: 8080

ingress:
  main:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - host: qb.jadogg.com
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: qbittorrent
    tls:
      - secretName: jadogg-wildcard-cert
        hosts:
          - qb.jadogg.com

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    storageClass: longhorn-replicated
    accessMode: ReadWriteOnce
    size: 1Gi
    advancedMounts:
      main:
        qbittorrent:
          - path: /config

  downloads:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: media-pvc
    advancedMounts:
      main:
        qbittorrent:
          - path: /downloads

