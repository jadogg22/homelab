---
# TRUENAS UI (Port 80)
apiVersion: v1
kind: Service
metadata:
  name: truenas-ui
  namespace: traefik
spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Endpoints
metadata:
  name: truenas-ui
  namespace: traefik
subsets:
  - addresses:
      - ip: 10.0.1.50
    ports:
      - name: http
        port: 80

---
# JELLYFIN (Port 30013)
apiVersion: v1
kind: Service
metadata:
  name: jellyfin-external
  namespace: traefik
spec:
  ports:
    - name: http
      port: 30013
      targetPort: 30013
---
apiVersion: v1
kind: Endpoints
metadata:
  name: jellyfin-external
  namespace: traefik
subsets:
  - addresses:
      - ip: 10.0.1.50
    ports:
      - name: http
        port: 30013

---
# SHARED INGRESS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nas-ingress
  namespace: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - secretName: jadogg-wildcard-cert
      hosts:
        - truenas.jadogg.com
        - jellyfin.jadogg.com
  rules:
    - host: truenas.jadogg.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: truenas-ui
                port:
                  number: 80
    - host: jellyfin.jadogg.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jellyfin-external
                port:
                  number: 30013
