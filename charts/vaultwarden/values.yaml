controllers:
  main:
    containers:
      main:
        image:
          repository: vaultwarden/server
          tag: 1.30.1
        env:
          - name: DOMAIN
            value: "https://vaultwarden.jadogg.com"
          - name: SIGNUPS_ALLOWED
            value: "true"
          - name: WEBSOCKET_ENABLED
            value: "true"
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            memory: 512Mi

service:
  main:
    controller: main
    ports:
      http:
        port: 80

ingress:
  main:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - host: vaultwarden.jadogg.com
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - secretName: jadogg-wildcard-cert
        hosts:
          - vaultwarden.jadogg.com

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    storageClass: longhorn-replicated
    accessMode: ReadWriteOnce
    size: 2Gi
