# 1. Access & Security
ingress:
  main:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - host: home.jadogg.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: jadogg-wildcard-cert
        hosts:
          - home.jadogg.com

# 2. Permissions (Required for K8s widget)
serviceAccount:
  create: true
  name: homepage
rbac:
  create: true

# 3. Dashboard Configuration
config:
  settings:
    title: Jadogg Homelab
    background: https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070&auto=format&fit=crop
    layout:
      Networking:
        style: row
        columns: 3
      Media Stack:
        style: row
        columns: 4
      Infrastructure:
        style: row
        columns: 3

  widgets:
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
        nodes:
          show: true
          cpu: true
          memory: true
    - datetime:
        format:
          timeStyle: short
          dateStyle: long

  services:
    - Networking:
        - AdGuard Home:
            icon: adguard-home.png
            href: https://adguard.jadogg.com
            description: Network DNS Filter
            widget:
              type: adguard
              url: http://adguard-home.default.svc.cluster.local
        - Pi-hole:
            icon: pi-hole.png
            href: https://pihole.jadogg.com
            description: Secondary DNS

    - Media Stack:
        - qBittorrent:
            icon: qbittorrent.png
            href: https://qb.jadogg.com
            description: Torrent Client
            widget:
              type: qbittorrent
              url: http://gluetun.default.svc.cluster.local:8080
        - Prowlarr:
            icon: prowlarr.png
            href: https://prowlarr.jadogg.com
            description: Indexer Manager
            widget:
              type: prowlarr
              url: http://prowlarr.default.svc.cluster.local:9696
              key: "{{HOMEPAGE_VAR_PROWLARR_KEY}}"
        - Sonarr:
            icon: sonarr.png
            href: https://sonarr.jadogg.com
            description: TV Series
            widget:
              type: sonarr
              url: http://sonarr.default.svc.cluster.local:8989
              key: "{{HOMEPAGE_VAR_SONARR_KEY}}"
        - Radarr:
            icon: radarr.png
            href: https://radarr.jadogg.com
            description: Movies
            widget:
              type: radarr
              url: http://radarr.default.svc.cluster.local:7878
              key: "{{HOMEPAGE_VAR_RADARR_KEY}}"
        - Lidarr:
            icon: lidarr.png
            href: https://lidarr.jadogg.com
            description: Music
            widget:
              type: lidarr
              url: http://lidarr.default.svc.cluster.local:8686
              key: "{{HOMEPAGE_VAR_LIDARR_KEY}}"
        - Readarr:
            icon: readarr.png
            href: https://readarr.jadogg.com
            description: Books
            widget:
              type: readarr
              url: http://readarr.default.svc.cluster.local:8787
              key: "{{HOMEPAGE_VAR_READARR_KEY}}"
        - Bazarr:
            icon: bazarr.png
            href: https://bazarr.jadogg.com
            description: Subtitles
            widget:
              type: bazarr
              url: http://bazarr.default.svc.cluster.local:6767
              key: "{{HOMEPAGE_VAR_BAZARR_KEY}}"

    - Infrastructure:
        - Argo CD:
            icon: argocd.png
            href: https://argocd.jadogg.com
            description: GitOps Manager
        - TrueNAS:
            icon: truenas.png
            href: https://truenas.jadogg.com
            description: Storage Backend
        - Portainer:
            icon: portainer.png
            href: https://portainer.jadogg.com
            description: Container Management

env:
  HOMEPAGE_ALLOWED_HOSTS: "home.jadogg.com"
