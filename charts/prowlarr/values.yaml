controllers:
  main:
    pod:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: "OnRootMismatch"
    containers:
      main:
        image:
          repository: ghcr.io/onedr0p/prowlarr
          tag: 1.31.2
        env:
          - name: PROWLARR__PORT
            value: "9696"
          - name: TZ
            value: "UTC"
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            memory: 512Mi

service:
  main:
    controller: main
    ports:
      http:
        port: 9696

ingress:
  main:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - host: prowlarr.jadogg.com
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - secretName: jadogg-wildcard-cert
        hosts:
          - prowlarr.jadogg.com

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    storageClass: longhorn-replicated
    accessMode: ReadWriteOnce
    size: 2Gi
